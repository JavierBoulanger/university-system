<script>
    const form = document.getElementById('kc-form-login');
    const btnLogin = document.getElementById('kc-login');

    form.addEventListener('submit', function(event) {
        // 1. Evitamos que la página web se recargue al dar clic
        event.preventDefault();

        // 2. Deshabilitamos el botón temporalmente para que no den doble clic
        btnLogin.disabled = true;
        btnLogin.value = "Validando...";

        const usernameValue = document.getElementById('username').value;
        const passwordValue = document.getElementById('password').value;

        fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username: usernameValue,
                password: passwordValue
            })
        })
            .then(response => {
                // Si el backend devuelve un 401 Unauthorized, lanzamos un error
                if (!response.ok) {
                    throw new Error('Usuario o contraseña incorrectos');
                }
                return response.json();
            })
            .then(data => {
                localStorage.setItem('userAccountId', data.accountId);
                localStorage.setItem('username', data.username);
                localStorage.setItem('userRole', data.role);

                window.location.href = '/dashboard.html';
            })
            .catch(error => {
                alert(error.message);
                btnLogin.disabled = false;
                btnLogin.value = "Iniciar sesión";
            });
    });
</script>
